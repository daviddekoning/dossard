            --text-main: #ffffff;
            --text-dim: #a0a0a8;
            --key-bg: rgba(255, 255, 255, 0.08);
            --key-active: rgba(255, 212, 0, 0.3);

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none; user-select: none; }
        .display-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        .header { position: absolute; top: 20px; text-align: center; width: 100%; }
        .header h1 { font-family: 'Outfit', sans-serif; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 4px; color: var(--tdf-yellow); font-weight: 900; }
        .bib-preview { font-family: 'Outfit', sans-serif; font-size: 5rem; font-weight: 900; margin-bottom: 10px; color: var(--text-main); text-shadow: 0 0 20px rgba(255, 212, 0, 0.4); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .rider-card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 30px; width: 100%; max-width: 400px; text-align: center; opacity: 0; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .rider-card.visible { opacity: 1; transform: translateY(0); }
        .rider-name { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 8px; line-height: 1.1; }
        .rider-team { color: var(--tdf-yellow); font-size: 1rem; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .rider-info { display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text-dim); font-size: 1.1rem; }
        .flag { font-size: 1.5rem; }
        .keypad-section { background: rgba(0, 0, 0, 0.4); border-top: 1px solid rgba(255, 255, 255, 0.05); padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 12px; height: 50vh; }
        .key { background: var(--key-bg); border: none; border-radius: 16px; color: var(--text-main); font-size: 1.8rem; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.1s ease; user-select: none; font-family: 'Outfit', sans-serif; }
        .key:active, .key.active { background: var(--key-active); transform: scale(0.95); }
        .key.special { color: var(--text-dim); font-size: 1.2rem; }
        .key.clear { color: #ff4d4d; }
        .timeout-bar-container { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.05); position: absolute; bottom: 0; left: 0; }
        .timeout-bar { height: 100%; background: var(--tdf-yellow); width: 0%; transition: width 1.5s linear; }
        @media (max-height: 700px) { .bib-preview { font-size: 3.5rem; } .rider-name { font-size: 1.6rem; } .key { font-size: 1.5rem; } }

        function handleInput(digit) { const now = Date.now(); if (now - lastTimestamp > TIMEOUT_MS) { currentInput = digit; } else { currentInput += digit; } if (currentInput.length > 3) { currentInput = digit; } lastTimestamp = now; updateUI(); startTimeoutTimer(); }

        function highlightKey(label) {
            const keys = document.querySelectorAll('.key');

                if (k.innerText === label) {

                    setTimeout(() => k.classList.remove('active'), 100);

        }

            if (e.key >= '0' && e.key <= '9') {
